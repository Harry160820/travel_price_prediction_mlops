version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    AIRFLOW__WEBSERVER__SECRET_KEY: "travel_mlops_secret_key_123"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./requirements.txt:/requirements.txt
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "
      pip install --no-cache-dir -r /requirements.txt &&
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
      pip install --no-cache-dir -r /requirements.txt &&
      airflow webserver
      "
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./requirements.txt:/requirements.txt
      - ../data:/opt/airflow/data       # <-- your added volume

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
      pip install --no-cache-dir -r /requirements.txt &&
      airflow scheduler
      "
    depends_on:
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./requirements.txt:/requirements.txt
      - ../data:/opt/airflow/data       # <-- your added volume

volumes:
  postgres-db-volume:
